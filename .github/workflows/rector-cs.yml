name: rector-cs

on:
  pull_request:
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/**'
      - 'rector.php'
      - '.php-cs-fixer.dist.php'
      - 'composer.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rector-cs:
    permissions:
      contents: write  # Required to commit formatting fixes back to the PR
    uses: yiisoft/actions/.github/workflows/rector-cs.yml@master
    with:
      php: '8.1'
