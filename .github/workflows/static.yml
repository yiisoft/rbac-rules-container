name: static analysis

on:
  pull_request:
    paths: &paths
      - 'config/**'
      - 'src/**'
      - '.github/workflows/static.yml'
      - 'composer.json'
      - 'psalm.xml'
  push:
    branches: ['master']
    paths: *paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  psalm:
    uses: yiisoft/actions/.github/workflows/psalm.yml@master
    with:
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.1', '8.2', '8.3']
